baseURL      = "https://azzurra.github.io"
languageCode = "it-IT"
title        = "Azzurra IRC Network"
theme        = "azzurra"

[pagination]
  pagerSize = 10

[params]
  description = "La prima e più longeva rete IRC italiana, dal 1997. Connettiti su irc.azzurra.chat."
  webchatURL  = "https://webchat.azzurra.chat"

  [[params.stats]]
    value = "1997"
    label = "Fondata"
  [[params.stats]]
    value = "27+"
    label = "Anni online"
  [[params.stats]]
    value = "100+"
    label = "Canali attivi"
  [[params.stats]]
    value = "24/7"
    label = "Uptime"

