baseURL = "https://azzurra.github.io"
title   = "Azzurra IRC Network"
theme   = "azzurra"

defaultContentLanguage         = "it"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 10

[params]
  webchatURL = "https://webchat.azzurra.chat"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

# ─────────────────────────────────────────────────────────────────────
# Italian (default — served at /)
# ─────────────────────────────────────────────────────────────────────
[languages.it]
  languageName = "Italiano"
  languageCode = "it-IT"
  contentDir   = "content/it"
  weight       = 1

  [languages.it.params]
    description = "La prima e più longeva rete IRC italiana, dal 1997. Connettiti su irc.azzurra.chat."

    [[languages.it.params.stats]]
      value = "1997"
      label = "Fondata"
    [[languages.it.params.stats]]
      value = "27+"
      label = "Anni online"
    [[languages.it.params.stats]]
      value = "100+"
      label = "Canali attivi"
    [[languages.it.params.stats]]
      value = "24/7"
      label = "Uptime"

  [[languages.it.menus.main]]
    name   = "Home"
    url    = "/"
    weight = 1
  [[languages.it.menus.main]]
    name   = "La Storia"
    url    = "/storia"
    weight = 2
  [[languages.it.menus.main]]
    name   = "Come Connettersi"
    url    = "/come-connettersi"
    weight = 3
  [[languages.it.menus.main]]
    name   = "Il Network"
    url    = "/network"
    weight = 4
  [[languages.it.menus.main]]
    name   = "FAQ"
    url    = "/faq"
    weight = 5
  [[languages.it.menus.main]]
    name   = "Contatti"
    url    = "/contatti"
    weight = 6

  [[languages.it.menus.footer]]
    name   = "Notizie"
    url    = "/news"
    weight = 1
    [languages.it.menus.footer.params]
      col = "rete"
  [[languages.it.menus.footer]]
    name   = "I Server"
    url    = "/network"
    weight = 2
    [languages.it.menus.footer.params]
      col = "rete"
  [[languages.it.menus.footer]]
    name   = "I Servizi"
    url    = "/servizi"
    weight = 3
    [languages.it.menus.footer.params]
      col = "rete"
  [[languages.it.menus.footer]]
    name   = "La Storia"
    url    = "/storia"
    weight = 1
    [languages.it.menus.footer.params]
      col = "info"
  [[languages.it.menus.footer]]
    name   = "Regolamento"
    url    = "/regolamento"
    weight = 2
    [languages.it.menus.footer.params]
      col = "info"
  [[languages.it.menus.footer]]
    name   = "FAQ"
    url    = "/faq"
    weight = 3
    [languages.it.menus.footer.params]
      col = "info"
  [[languages.it.menus.footer]]
    name   = "Contatti"
    url    = "/contatti"
    weight = 4
    [languages.it.menus.footer.params]
      col = "info"

