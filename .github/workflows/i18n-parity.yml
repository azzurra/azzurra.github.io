name: i18n parity

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  parity:
    name: IT/EN parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every content/*.md has its language counterpart
        run: |
          set -euo pipefail
          missing=()
          # Walk every content/*.md. Skip section indexes (Hugo allows IT-only
          # _index.md). For everything else: enforce a sibling in the OTHER
          # language. foo.md → foo.en.md and foo.en.md → foo.md.
          while IFS= read -r f; do
            base=$(basename "$f")
            [[ "$base" == _index.md ]] && continue

            dir=$(dirname "$f")
            if [[ "$base" == *.en.md ]]; then
              stem="${base%.en.md}"
              sibling="${dir}/${stem}.md"
            else
              stem="${base%.md}"
              sibling="${dir}/${stem}.en.md"
            fi

            if [[ ! -f "$sibling" ]]; then
              missing+=("$f → expected $sibling")
            fi
          done < <(find content -type f -name '*.md' | sort)

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::i18n parity broken — missing language counterparts:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "✓ i18n parity OK"
