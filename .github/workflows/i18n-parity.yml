name: i18n parity

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  parity:
    name: IT/EN parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every content/*.md touched in this PR has its language counterpart
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Delta-based parity gate — mirrors .githooks/pre-commit. We only
          # block when THIS PR adds or modifies a content/*.md whose
          # language counterpart is missing from the resulting tree.
          # Skipping the unchanged backlog lets the i18n work land
          # incrementally (scaffold → content → aliases) without each PR
          # having to ship a complete translation set.
          if [[ -n "${BASE_SHA:-}" && -n "${HEAD_SHA:-}" ]]; then
            range="$BASE_SHA..$HEAD_SHA"
          else
            # push event on master: compare against previous commit
            range="HEAD^..HEAD"
          fi

          mapfile -t touched < <(
            git diff --name-only --diff-filter=AMR "$range" \
              | grep -E '^content/.*\.md$' || true
          )

          if [[ ${#touched[@]} -eq 0 ]]; then
            echo "✓ no content/*.md touched in this range — parity OK"
            exit 0
          fi

          # Helper: file exists in resulting tree OR is also touched in this range.
          have() {
            [[ -f "$1" ]] && return 0
            printf '%s\n' "${touched[@]}" | grep -qx "$1"
          }

          missing=()
          for f in "${touched[@]}"; do
            base=$(basename "$f")
            [[ "$base" == _index.md ]] && continue

            dir=$(dirname "$f")
            if [[ "$base" == *.en.md ]]; then
              stem="${base%.en.md}"
              sibling="${dir}/${stem}.md"
            else
              stem="${base%.md}"
              sibling="${dir}/${stem}.en.md"
            fi

            have "$sibling" || missing+=("$f → expected $sibling")
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::i18n parity broken — missing language counterparts:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "✓ i18n parity OK (${#touched[@]} touched file(s) verified)"
