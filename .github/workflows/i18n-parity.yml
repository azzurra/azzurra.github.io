name: i18n parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parity:
    name: IT/EN parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every content/*.md has a sibling .en.md
        run: |
          set -euo pipefail
          missing=()
          # Find every .md under content/ that is NOT already an .en.md
          # and NOT a section _index.md (those are allowed IT-only).
          while IFS= read -r f; do
            base=$(basename "$f")
            [[ "$base" == *.en.md ]] && continue
            [[ "$base" == _index.md ]] && continue

            dir=$(dirname "$f")
            stem="${base%.md}"
            en_path="${dir}/${stem}.en.md"

            if [[ ! -f "$en_path" ]]; then
              missing+=("$f → expected $en_path")
            fi
          done < <(find content -type f -name '*.md' | sort)

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::i18n parity broken — missing English translations:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "✓ i18n parity OK"
