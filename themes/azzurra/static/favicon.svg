<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9dcde8"/>
      <stop offset="100%" stop-color="#4a9ad4"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6275"/>
      <stop offset="100%" stop-color="#1a6bbf"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <!-- A letter -->
  <text
    x="16" y="23.5"
    font-family="'Inter', 'Arial Black', sans-serif"
    font-size="21"
    font-weight="900"
    text-anchor="middle"
    fill="white"
    style="text-shadow: 0 1px 3px rgba(0,0,0,0.25)"
  >A</text>
</svg>
